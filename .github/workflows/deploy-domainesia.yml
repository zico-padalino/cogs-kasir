name: Deploy to Domainesia

# Secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER      = ftp.kedaitjoan.online
#   FTP_USERNAME    = zico-padalino@kedaitjoan.online
#   FTP_PASSWORD    = (password FTP)
#   FTP_SERVER_DIR  = public_html/   ← folder web root di server (relative dari home FTP)
#
# Push ke main/master → build → upload langsung ke server (tanpa extract manual).
# File .env di server TIDAK ditimpa (tidak ikut upload).

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-domainesia
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, json, bcmath, fileinfo, tokenizer, pdo, pdo_mysql, zip
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare release for public_html layout
        run: bash deploy/prepare-release.sh

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          local-dir: ./release/
          port: 21
          protocol: ftp
          timeout: 600000
          dangerous-clean-slate: false
          state-name: .ftp-deploy-sync-state.json
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/.env
            **/.env.*
            **/.DS_Store

      - name: Deploy summary
        run: |
          echo "Deploy selesai — https://kedaitjoan.online"
          echo "Deploy berikutnya hanya upload file yang berubah (incremental FTP)."
