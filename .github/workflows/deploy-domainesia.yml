name: Deploy to Domainesia

# Secrets:
#   FTP_SERVER      = ftp.kedaitjoan.online  (atau 202.155.137.36)
#   FTP_USERNAME    = akun FTP yang Directory = public_html
#   FTP_PASSWORD    = (password)
#   FTP_SERVER_DIR  = ./
#
# HANYA upload file dari commit/push terbaru.
# CSS/JS berubah → npm build + upload build/.
# vendor/ di-skip (kecuali Run workflow → Include vendor).

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      include_vendor:
        description: "Upload vendor/ juga (jika composer berubah)"
        type: boolean
        default: false

concurrency:
  group: deploy-domainesia
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy changed files
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      INCLUDE_VENDOR: ${{ github.event_name == 'workflow_dispatch' && inputs.include_vendor && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize FTP secrets
        id: ftp
        env:
          RAW_SERVER: ${{ secrets.FTP_SERVER }}
          RAW_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail
          SERVER=$(printf '%s' "${RAW_SERVER:-}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed -E 's#^(ftp|ftps|sftp)://##I' | sed 's#/$##')
          DIR=$(printf '%s' "${RAW_DIR:-./}" | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          if [ -z "$SERVER" ]; then
            echo "::error::Secret FTP_SERVER kosong"
            exit 1
          fi
          if ! getent hosts "$SERVER" >/dev/null 2>&1; then
            if [ "$SERVER" = "ftp.kedaitjoan.online" ] || [ "$SERVER" = "kedaitjoan.online" ]; then
              SERVER="202.155.137.36"
            else
              echo "::error::Host FTP tidak resolve"
              exit 1
            fi
          fi
          echo "server=$SERVER" >> "$GITHUB_OUTPUT"
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Resolve deploy range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ -z "$BEFORE" ] || [[ "$BEFORE" =~ ^0+$ ]]; then
              RANGE="HEAD~1..HEAD"
            else
              RANGE="${BEFORE}..${{ github.sha }}"
            fi
          else
            RANGE="HEAD~1..HEAD"
          fi
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Deploy range: $RANGE"
          git log --oneline "$RANGE" || git log -1 --oneline

          # Auto-upload vendor jika composer berubah (hindari HTTP 500 di shared hosting)
          if git diff --name-only "$RANGE" | grep -Eq '^(composer\.json|composer\.lock)$'; then
            echo "composer_changed=1" >> "$GITHUB_OUTPUT"
          else
            echo "composer_changed=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup PHP (vendor)
        if: env.INCLUDE_VENDOR == '1' || steps.range.outputs.composer_changed == '1'
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, json, bcmath, fileinfo, tokenizer, pdo, pdo_mysql, zip
          coverage: none
          tools: composer:v2

      - name: Install Composer (vendor)
        if: env.INCLUDE_VENDOR == '1' || steps.range.outputs.composer_changed == '1'
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist
          echo "INCLUDE_VENDOR=1" >> "$GITHUB_ENV"

      - name: Prepare changed files only
        id: prep
        env:
          DEPLOY_RANGE: ${{ steps.range.outputs.range }}
        run: bash deploy/prepare-changed-release.sh

      - name: Setup Node.js
        if: steps.prep.outputs.need_frontend == '1'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Build frontend assets
        if: steps.prep.outputs.need_frontend == '1'
        run: |
          npm ci
          npm run build
          mkdir -p release/build
          cp -a public/build/. release/build/

      - name: Upload changed files via FTP
        if: steps.prep.outputs.need_deploy == '1' || steps.prep.outputs.need_frontend == '1'
        env:
          FTP_SERVER: ${{ steps.ftp.outputs.server }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ steps.ftp.outputs.dir }}
        run: bash deploy/upload-release-ftp.sh

      - name: Nothing to deploy
        if: steps.prep.outputs.need_deploy != '1' && steps.prep.outputs.need_frontend != '1'
        run: echo "Tidak ada file aplikasi yang perlu di-upload."

      - name: Summary
        run: |
          echo "Selesai — https://kedaitjoan.online"
          echo "Mode: hanya file dari commit/push terbaru"
          echo "Copied: ${{ steps.prep.outputs.copied }}"
          echo "Frontend build: ${{ steps.prep.outputs.need_frontend }}"
