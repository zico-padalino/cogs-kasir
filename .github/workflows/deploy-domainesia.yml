name: Deploy to Domainesia

# Secrets (Settings → Secrets and variables → Actions):
#   FTP_SERVER         = ftp.kedaitjoan.online
#   FTP_USERNAME       = zico-padalino@kedaitjoan.online
#   FTP_PASSWORD       = (password FTP)
#   FTP_SERVER_DIR     = ./
#   DEPLOY_TOKEN       = (string acak, contoh: kedaiDeploy2026xyz)
#   DEPLOY_EXTRACT_URL = https://kedaitjoan.online/public/extract-deploy.php
#     (pakai /public/ selama document root masih public_html default Domainesia)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-domainesia
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & FTP Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, json, bcmath, fileinfo, tokenizer, pdo, pdo_mysql, zip
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Pack release zip
        run: |
          mkdir -p ftp-payload/public
          zip -r ftp-payload/deploy.zip . \
            -x "./.git/*" \
            -x "./.github/*" \
            -x "./node_modules/*" \
            -x "./ftp-payload/*" \
            -x "./tests/*" \
            -x "./mobile/*" \
            -x "./deploy/*" \
            -x "./.env" \
            -x "./.env.*" \
            -x "./.phpunit.cache/*" \
            -x "./storage/logs/*" \
            -x "./storage/framework/cache/data/*" \
            -x "./storage/framework/sessions/*" \
            -x "./storage/framework/views/*" \
            -x "./storage/pail/*"
          ls -lh ftp-payload/deploy.zip

      - name: Prepare extract script
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Secret DEPLOY_TOKEN belum diisi di GitHub."
            exit 1
          fi
          python3 -c "
          from pathlib import Path
          import os
          token = os.environ['DEPLOY_TOKEN'].replace('\\\\', '\\\\\\\\').replace(\"'\", \"\\\\'\")
          src = Path('deploy/extract-deploy.php').read_text(encoding='utf-8')
          Path('ftp-payload/public/extract-deploy.php').write_text(
              src.replace('__DEPLOY_TOKEN__', token),
              encoding='utf-8',
          )
          print('extract-deploy.php ready')
          "

      - name: Upload zip via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          DIR="${FTP_SERVER_DIR:-./}"
          lftp -c "
            set ftp:passive-mode true;
            set net:timeout 60;
            set net:max-retries 3;
            set ssl:verify-certificate no;
            open -p 21 -u \"${FTP_USERNAME}\",\"${FTP_PASSWORD}\" ftp://${FTP_SERVER};
            cd ${DIR};
            mkdir -p public;
            put -O . ftp-payload/deploy.zip;
            put -O public ftp-payload/public/extract-deploy.php;
            bye
          "

      - name: Extract on server
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_EXTRACT_URL: ${{ secrets.DEPLOY_EXTRACT_URL }}
        run: |
          # Domainesia default document root = public_html, jadi script ada di /public/...
          # Setelah document root diganti ke folder public Laravel, pakai URL tanpa /public.
          CANDIDATES=()
          if [ -n "${DEPLOY_EXTRACT_URL}" ]; then
            CANDIDATES+=("${DEPLOY_EXTRACT_URL}")
          fi
          CANDIDATES+=(
            "https://kedaitjoan.online/public/extract-deploy.php"
            "https://kedaitjoan.online/extract-deploy.php"
          )

          ok=0
          for URL in "${CANDIDATES[@]}"; do
            echo "Coba extract: $URL"
            if curl -fsS --retry 2 --retry-delay 3 "${URL}?token=${DEPLOY_TOKEN}"; then
              echo
              echo "Extract berhasil via $URL"
              ok=1
              break
            fi
            echo "Gagal: $URL"
          done

          if [ "$ok" -ne 1 ]; then
            echo "Semua URL extract gagal (404). Cek:"
            echo "1) File public/extract-deploy.php sudah ter-upload"
            echo "2) Secret DEPLOY_EXTRACT_URL = https://kedaitjoan.online/public/extract-deploy.php"
            echo "3) Atau set document root domain ke folder public Laravel"
            exit 1
          fi
