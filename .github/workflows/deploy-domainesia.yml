name: Deploy to Domainesia

# Secrets:
#   FTP_SERVER         = ftp.kedaitjoan.online
#   FTP_USERNAME       = zico-padalino@kedaitjoan.online
#   FTP_PASSWORD       = (password akun FTP)
#   FTP_SERVER_DIR     = ./
#     Catatan: di cPanel, path akun FTP di atas HARUS /home/kedaitjo/public_html
#   DEPLOY_TOKEN       = kedaiDeploy2026xyz
#   DEPLOY_EXTRACT_URL = https://kedaitjoan.online/extract-deploy.php

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-domainesia
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & FTP Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, xml, ctype, json, bcmath, fileinfo, tokenizer, pdo, pdo_mysql, zip
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Pack release zip
        run: |
          mkdir -p ftp-payload
          zip -r ftp-payload/deploy.zip . \
            -x "./.git/*" \
            -x "./.github/*" \
            -x "./node_modules/*" \
            -x "./ftp-payload/*" \
            -x "./tests/*" \
            -x "./mobile/*" \
            -x "./deploy/*" \
            -x "./.env" \
            -x "./.env.*" \
            -x "./.phpunit.cache/*" \
            -x "./storage/logs/*" \
            -x "./storage/framework/cache/data/*" \
            -x "./storage/framework/sessions/*" \
            -x "./storage/framework/views/*" \
            -x "./storage/pail/*"
          ls -lh ftp-payload/deploy.zip

      - name: Prepare extract script
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          if [ -z "$DEPLOY_TOKEN" ]; then
            echo "Secret DEPLOY_TOKEN belum diisi."
            exit 1
          fi
          python3 -c "
          from pathlib import Path
          import os
          token = os.environ['DEPLOY_TOKEN'].replace('\\\\', '\\\\\\\\').replace(\"'\", \"\\\\'\")
          src = Path('deploy/extract-deploy.php').read_text(encoding='utf-8')
          Path('ftp-payload/extract-deploy.php').write_text(
              src.replace('__DEPLOY_TOKEN__', token),
              encoding='utf-8',
          )
          print('extract-deploy.php ready')
          "

      - name: Upload zip via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          set -euo pipefail

          if [ -z "${FTP_SERVER}" ] || [ -z "${FTP_USERNAME}" ] || [ -z "${FTP_PASSWORD}" ]; then
            echo "FTP_SERVER / FTP_USERNAME / FTP_PASSWORD belum lengkap."
            exit 1
          fi

          # Normalisasi folder tujuan
          DIR="${FTP_SERVER_DIR:-./}"
          DIR="${DIR#/}"          # buang leading slash
          DIR="${DIR%/}"          # buang trailing slash
          if [ -z "$DIR" ] || [ "$DIR" = "." ]; then
            REMOTE_BASE=""
          else
            REMOTE_BASE="${DIR}/"
          fi

          echo "Host: ${FTP_SERVER}"
          echo "User: ${FTP_USERNAME}"
          echo "Remote base: /${REMOTE_BASE}"
          echo "DNS:"
          getent hosts "${FTP_SERVER}" || true
          echo "Port 21:"
          (timeout 8 bash -c "echo > /dev/tcp/${FTP_SERVER}/21" && echo "port 21 open") || echo "port 21 tidak bisa diakses dari runner"

          upload() {
            local proto="$1"
            local file="$2"
            local remote_name="$3"
            local url="${proto}://${FTP_SERVER}/${REMOTE_BASE}${remote_name}"
            echo "Upload ${file} -> ${url}"
            curl --fail --show-error --silent \
              --connect-timeout 30 \
              --max-time 600 \
              --ftp-pasv \
              --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
              -T "${file}" \
              "${url}"
          }

          ok=0
          for proto in ftp ftps; do
            echo "=== Coba protokol: ${proto} ==="
            if upload "${proto}" "ftp-payload/deploy.zip" "deploy.zip" \
              && upload "${proto}" "ftp-payload/extract-deploy.php" "extract-deploy.php"; then
              echo "Upload sukses via ${proto}"
              ok=1
              break
            fi
            echo "Gagal via ${proto}"
          done

          if [ "$ok" -ne 1 ]; then
            echo
            echo "FTP GAGAL (Not connected / auth)."
            echo "Cek secret:"
            echo "  FTP_SERVER   = ftp.kedaitjoan.online"
            echo "  FTP_USERNAME = zico-padalino@kedaitjoan.online   (yang sebelumnya bisa connect)"
            echo "  FTP_PASSWORD = password akun itu"
            echo "  FTP_SERVER_DIR = ./     (jika path akun FTP sudah = public_html)"
            echo "                 atau public_html/  (jika pakai akun utama kedaitjo)"
            echo
            echo "Di cPanel → FTP Accounts → path akun HARUS:"
            echo "  /home/kedaitjo/public_html"
            exit 1
          fi

      - name: Verify extract script is public
        run: |
          for URL in \
            "https://kedaitjoan.online/extract-deploy.php" \
            "${{ secrets.DEPLOY_EXTRACT_URL }}"
          do
            [ -z "$URL" ] && continue
            code=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || true)
            echo "HTTP $code  $URL"
          done

      - name: Extract on server
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_EXTRACT_URL: ${{ secrets.DEPLOY_EXTRACT_URL }}
        run: |
          CANDIDATES=()
          if [ -n "${DEPLOY_EXTRACT_URL}" ]; then
            CANDIDATES+=("${DEPLOY_EXTRACT_URL}")
          fi
          CANDIDATES+=("https://kedaitjoan.online/extract-deploy.php")

          ok=0
          for URL in "${CANDIDATES[@]}"; do
            echo "Coba extract: $URL"
            # 403 = file ketemu tapi token salah; 404 = path FTP salah
            body=$(curl -sS -w "\n%{http_code}" --retry 2 --retry-delay 2 "${URL}?token=${DEPLOY_TOKEN}" || true)
            code=$(echo "$body" | tail -n1)
            text=$(echo "$body" | sed '$d')
            echo "HTTP $code"
            echo "$text"
            if [ "$code" = "200" ] && echo "$text" | grep -qi "Deploy extracted OK"; then
              ok=1
              break
            fi
            if [ "$code" = "404" ]; then
              echo "→ File tidak ada di document root. Perbaiki FTP_SERVER_DIR / path akun FTP ke public_html."
            fi
          done

          if [ "$ok" -ne 1 ]; then
            echo
            echo "EXTRACT GAGAL."
            echo "Di cPanel → FTP Accounts, pastikan akun FTP path-nya:"
            echo "  /home/USER/public_html"
            echo "Lalu secret FTP_SERVER_DIR = /public_html/"
            echo "Atau pakai FTP username utama (kedaitjo) + FTP_SERVER_DIR=/public_html/"
            exit 1
          fi
